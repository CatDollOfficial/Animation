    </filter>
  </defs>

  <rect width="128" height="128" rx="30" fill="url(#bg)"/>
  <circle cx="87" cy="34" r="48" fill="url(#orb)"/>
  <circle cx="25" cy="101" r="34" fill="#ff8ca8" opacity="0.14"/>
