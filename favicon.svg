      <stop offset="1" stop-color="#ff8ca8"/>
    </linearGradient>
    <linearGradient id="earRight" x1="72" y1="22" x2="97" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd4e0"/>
      <stop offset="1" stop-color="#ff8ca8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
