<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">CatDollOfficial Favicon</title>
  <desc id="desc">A glowing cat emblem with a star accent on a deep gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="0.55" stop-color="#123b5b"/>
      <stop offset="1" stop-color="#1d7f7a"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientTransform="translate(87 34) rotate(123) scale(52 47)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8cf3ff"/>
      <stop offset="1" stop-color="#8cf3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fur" x1="38" y1="30" x2="91" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.55" stop-color="#ffe6b0"/>
      <stop offset="1" stop-color="#ffb562"/>
    </linearGradient>
    <linearGradient id="ear" x1="31" y1="22" x2="56" y2="50" gradientUnits="userSpaceOnUse">
