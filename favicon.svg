    <path d="M34 44 42 19c1-3 5-4 8-1l13 13c1 1 2 1 3 0l13-13c3-3 7-2 8 1l8 25c6 7 10 16 10 27 0 24-18 39-41 39S23 95 23 71c0-11 4-20 11-27Z" fill="url(#fur)"/>
