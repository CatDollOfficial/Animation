    <path d="M64 96c-4 4-8 6-13 6M64 96c4 4 8 6 13 6" fill="none" stroke="#5f3a42" stroke-width="3" stroke-linecap="round"/>
    <path d="M18 77h24M17 86h22M86 77h24M89 86h22" fill="none" stroke="#fffaf1" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.9"/>
